name = "tgbotcredit"
main = "index.js"
compatibility_date = "2026-04-15"

d1_databases = [
  { binding = "DB", database_id = "d6f69b40-6768-431d-a2a4-2233aa802bc7", database_name = "japs" }
]

[vars]
# Put Telegram group chat IDs here (supports comma / space / newline / ; / Chinese comma separators).
# Example: "-1001234567890,-1009876543210"
LANG_GROUPS_ZH_HANS = "-1003833625956"
LANG_GROUPS_ZH_HANT = "-1003488196206"
LANG_GROUPS_JA = "-1003974622683"
LANG_GROUPS_KO = "-1003958907510"
LANG_GROUPS_ES = "-1003828411769"
LANG_GROUPS_EN = "-1003561230213,-1003949678138,-1003952940495"

# /updaterank private admin command. Set this to your Telegram numeric user id.
UPDATERANK_ADMIN_TG_USER_ID = "8684441706"

[triggers]
# 22:05 Beijing time (UTC+8) = 14:05 UTC
crons = ["5 14 * * *"]
