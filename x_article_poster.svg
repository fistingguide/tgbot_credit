<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="220" y1="210" x2="1440" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2937" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="190" y="175" width="1260" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="120" r="220" fill="#2563EB" fill-opacity="0.15"/>
  <circle cx="220" cy="760" r="260" fill="#10B981" fill-opacity="0.12"/>
  <circle cx="760" cy="860" r="180" fill="#F59E0B" fill-opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="220" y="210" width="1160" height="550" rx="28" fill="url(#card)" stroke="#374151" stroke-opacity="0.7"/>
  </g>

  <text x="220" y="120" fill="#93C5FD" font-size="34" font-weight="700" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">FistingGuide · 积分制度</text>
  <text x="220" y="178" fill="#F9FAFB" font-size="62" font-weight="800" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">如何提升你的网站排名 🚀</text>

  <text x="280" y="300" fill="#E5E7EB" font-size="34" font-weight="700" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    总积分 = 粉丝贡献分 + 文字互动分 + 图片互动分 + 视频互动分 + 活动积分 + 超级积分
  </text>

  <text x="280" y="372" fill="#D1D5DB" font-size="30" font-weight="500" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    ✅ 活动福利：参加活动可获得一段时间霸榜福利 🏆
  </text>
  <text x="280" y="426" fill="#D1D5DB" font-size="30" font-weight="500" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    ✅ 排名更新：每天凌晨 0 点自动更新 ⏰
  </text>
  <text x="280" y="480" fill="#D1D5DB" font-size="30" font-weight="500" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    ✅ 查询命令：/me 查看个人积分，/list 查看排行榜
  </text>

  <rect x="268" y="540" width="1040" height="2" fill="#374151"/>

  <text x="280" y="610" fill="#93C5FD" font-size="30" font-weight="700" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    🌐 网站入口：https://www.fisting.guide
  </text>
  <text x="280" y="662" fill="#A7F3D0" font-size="30" font-weight="700" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    💬 TG群聊入口：http://t.me/fistingguidebot
  </text>

  <text x="280" y="720" fill="#F3F4F6" font-size="28" font-weight="500" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    持续贡献，持续连接，持续成长。欢迎提出建议 🙌
  </text>
</svg>
